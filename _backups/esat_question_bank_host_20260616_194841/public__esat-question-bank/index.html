<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>ESAT Question Bank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #fff7ed, #eef6ff);
      font-family: Arial, Helvetica, sans-serif;
      color: #172033;
    }

    .card {
      width: min(720px, calc(100% - 32px));
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      box-shadow: 0 22px 60px rgba(15,23,42,.12);
      padding: 34px;
      text-align: center;
    }

    .kicker {
      color: #7d1108;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      font-size: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      color: #7d1108;
      font-size: 38px;
      line-height: 1.1;
    }

    p {
      color: #475569;
      line-height: 1.7;
      font-size: 16px;
      margin: 16px 0 0;
    }

    a {
      display: inline-flex;
      margin-top: 24px;
      background: #0b3a78;
      color: white;
      text-decoration: none;
      font-weight: 900;
      padding: 13px 20px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="kicker">Thriving Scholars</div>
    <h1>ESAT Question Bank</h1>
    <p>
      This protected ESAT question bank page is ready. Replace this file with the
      final ESAT question-bank HTML when the question-bank build is ready.
    </p>
    <a href="/esat">← Back to ESAT Workspace</a>
  </div>
</body>
</html>

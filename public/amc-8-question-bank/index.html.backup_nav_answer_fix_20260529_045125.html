<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AMC 8 Question Bank</title>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(','\\)']],
        displayMath: [['\\[','\\]']]
      },
      options: {
        skipHtmlTags: ['script','noscript','style','textarea','pre','code']
      }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
.hint-box{
  margin-top:12px;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(251,191,36,.55);
  background:#fffbeb;
  display:none;
  font-size:16px;
}

.hint-box h4{
  margin:0 0 8px;
  font-size:16px;
  color:#92400e;
}
.filter-box{
  display:inline-block;
  padding:2px 8px;
  border:1px solid #111827;
  border-radius:8px;
  background:#fff;
  color:#111827;
  font-weight:800;
  font-size:12px;
  margin:0 2px;
  vertical-align:baseline;
}

:root{
  --blue:#0074c1;
  --blue2:#005fa3;
  --bg:#ffffff;
  --text:#0b1220;
  --muted:#475569;
  --border:#cbd5e1;
  --chip:#eef6ff;
  --good:#22c55e;
  --bad:#ef4444;
  --warn:#fbbf24;
  --card:#ffffff;
  --shadow:0 10px 24px rgba(15,23,42,.10);
  --radius:14px;
  --pad:20px;
  --font:"Georgia", serif;
  --calcIcon: url("https://static.wixstatic.com/media/98f2c5_b313bf07122944b5b74d5e5c9fd53a00~mv2.png");
}

body{
  margin:0;
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
}

/* Back to main menu button (distinct) */
.btn.menu{
  background:#fbbf24;          /* amber */
  color:#111827;
  border:1px solid rgba(17,24,39,.25);
  font-weight:900;
}
.btn.menu:hover{ filter:brightness(.98); }
.btn.menu:active{ transform:translateY(1px); }

/* Header */
.header{
  background:var(--blue);
  color:white;
  padding:10px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.header-left{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:260px;
}
.brand{
  font-weight:800;
  font-size:18px;
  line-height:1.1;
}
.subbrand{
  font-size:12px;
  opacity:.9;
  margin-top:2px;
}

.header-right{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.25);
  font-size:13px;
  white-space:nowrap;
}
.pill strong{ font-weight:800; }

.btn{
  appearance:none;
  border:none;
  background:var(--blue2);
  color:white;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  line-height:1;
}
.btn:hover{ filter:brightness(.98); }
.btn:active{ transform:translateY(1px); }

.btn.outline{
  background:transparent;
  border:1px solid rgba(255,255,255,.6);
}

.btn.light{
  background:white;
  color:#111827;
  border:1px solid rgba(255,255,255,.6);
}

/* Layout */
.container{
  padding: 18px 22px 90px;
  max-width: 1200px;
  margin: 0 auto;
  font-size:19px;
  line-height:1.65;
  box-sizing:border-box;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
  margin: 14px 0 12px;
}

.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  background:var(--chip);
  border:1px solid #dbeafe;
  color:#0b3b66;
  border-radius:999px;
  font-size:13px;
}
.chip .dot{
  width:8px;height:8px;border-radius:50%;
  background:#60a5fa;
  display:inline-block;
}

.save-indicator{
  font-size:12px;
  color:rgba(255,255,255,.9);
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.12);
  display:none;
}

/* Question Card */
.qcard{
  background:var(--card);
  border:1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 18px 14px;
}

.qhead{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.qtitle{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:22px;
  font-weight:800;
  margin:0;
}
.qtitle .calc{
  width:18px;height:18px;
  background-image:var(--calcIcon);
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  display:inline-block;
  filter: drop-shadow(0 1px 1px rgba(0,0,0,.12));
}

.qmeta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:flex-end;
}
.meta-pill{
  font-size:12px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #e5e7eb;
  background:#f9fafb;
  color:#111827;
  white-space:nowrap;
}
.meta-pill.good{ border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.10); }
.meta-pill.bad{ border-color: rgba(239,68,68,.35); background: rgba(239,68,68,.10); }
.meta-pill.warn{ border-color: rgba(251,191,36,.45); background: rgba(251,191,36,.12); }

.qbody{ margin-top:10px; }
.qbody p{ margin: 12px 0; }

/* Media (images) */
.question-media{
  margin: 14px 0 18px;
  display:flex;
  justify-content:center;
}
.question-media img{
  display:block;
  max-width: 340px;
  width:100%;
  height:auto;
  border:1.5px solid #e5e7eb;
  border-radius:12px;
  padding:10px;
  background:#fff;
}
.media-caption{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  margin-top:8px;
}

/* Options */
.options{
  margin-top: 18px;
  margin-bottom: 10px;
}
.option{
  display:block;
  padding:10px 12px;
  border:1px solid #e5e7eb;
  border-radius:12px;
  margin:10px 0;
  cursor:pointer;
  background:#fff;
  transition: transform .05s ease, border-color .12s ease, background .12s ease;
}
.option:hover{
  transform: translateY(-1px);
  border-color:#c7d2fe;
  background:#fafbff;
}
.option-row{
  display:flex;
  align-items:flex-start;
  gap:10px;
}
input[type="radio"]{
  transform:scale(1.25);
  margin-top:3px;
  cursor:pointer;
}

.option.correct{
  border-color: rgba(34,197,94,.35);
  background: rgba(34,197,94,.08);
}
.option.wrong{
  border-color: rgba(239,68,68,.35);
  background: rgba(239,68,68,.08);
}

/* Feedback + solution */
.feedback{
  margin: 10px 0 0;
  padding: 10px 12px;
  border-radius: 12px;
  border:1px solid #e5e7eb;
  background:#f9fafb;
  font-size:16px;
}
.feedback.good{ border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.10); }
.feedback.bad{ border-color: rgba(239,68,68,.35); background: rgba(239,68,68,.10); }

.solution{
  margin-top:12px;
  padding: 12px 12px;
  border-radius: 12px;
  border:1px dashed #94a3b8;
  background:#fbfdff;
  display:none;
}
.solution h4{
  margin:0 0 8px;
  font-size:16px;
}

/* Footer bar */
.footer{
  background:var(--blue);
  padding:10px 18px;
  position:fixed;
  left:0; right:0; bottom:0;
  display:flex;
  justify-content:center;
  z-index:50;
}
.footer-inner{
  width: min(1200px, 100%);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.footer-left, .footer-right{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.footer button{
  font-size:14px;
  padding:8px 12px;
  background:var(--blue2);
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.footer button.outline{
  background:transparent;
  border:1px solid rgba(255,255,255,.6);
}
.footer button.light{
  background:white;
  color:#111827;
  border:1px solid rgba(255,255,255,.6);
}
.footer button:disabled{
  opacity:.55;
  cursor:not-allowed;
}

/* Make header buttons consistent */
.header .btn.light{
  background:#fff;
  color:#111827;
  border:1px solid rgba(255,255,255,.6);
}

/* Active state for Flag (and any other header light button you want to toggle) */
.btn.light.active{
  background:#fef3c7 !important;              /* same highlight as before */
  border:2px solid rgba(17,24,39,.55) !important;
  font-weight:900 !important;
}

/* Modals */
.overlay{
  position:fixed; inset:0;
  background:rgba(15,23,42,.55);
  display:none;
  z-index:100;
  padding: 18px;
  overflow:auto;
}
.modal{
  max-width: 980px;
  margin: 28px auto;
  background:white;
  border-radius: 16px;
  box-shadow: 0 30px 70px rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.25);
}
.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding: 14px 16px;
  border-bottom:1px solid #e5e7eb;
}
.modal-header h3{
  margin:0;
  font-size:18px;
  font-weight:900;
  color:#0b1220;
}
.modal-body{ padding: 14px 16px 16px; }
.modal-footer{
  padding: 12px 16px;
  border-top:1px solid #e5e7eb;
  display:flex;
  justify-content:flex-end;
  gap:10px;
  flex-wrap:wrap;
}
.modal-close{
  background:#f3f4f6;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:8px 10px;
  cursor:pointer;
  font-weight:700;
}

/* Navigator grid */
.nav-toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.nav-grid{
  display:grid;
  grid-template-columns: repeat(10, minmax(0,1fr));
  gap:8px;
}
@media(max-width:820px){
  .nav-grid{ grid-template-columns: repeat(6, minmax(0,1fr)); }
}
@media(max-width:520px){
  .nav-grid{ grid-template-columns: repeat(5, minmax(0,1fr)); }
}
.nav-btn{
  border:1px solid #cbd5e1;
  background:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:800;
  font-size:13px;
  position:relative;
  user-select:none;

  /* your later override keeps the tile layout */
  padding:14px 8px 10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
}
.nav-btn.current{
  outline: 3px solid rgba(59,130,246,.35);
  border-color:#60a5fa;
}
.nav-btn.unseen{ background:#f8fafc; }
.nav-btn.attempted{ background:#eef2ff; }
.nav-btn.correct{ background: rgba(34,197,94,.14); border-color: rgba(34,197,94,.35); }
.nav-btn.incorrect{ background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.35); }
.nav-btn.flagged{ box-shadow: inset 0 0 0 2px rgba(251,191,36,.85); }
.nav-btn.saved{ box-shadow: inset 0 0 0 2px rgba(16,185,129,.65); }
.nav-icons{
  position:absolute;
  right:6px;
  top:6px;
  font-size:12px;
  opacity:.9;
  display:flex;
  gap:4px;
}

/* Filters UI (more efficient layout) */
.filter-grid{
  display:grid;
  gap:12px 18px;
  align-items:start;
  grid-template-columns: 320px 1fr 260px;
  grid-template-areas:
    "status  topics paper"
    "diff    topics sort";
}
#fCardStatus{ grid-area: status; }
#fCardDifficulty{ grid-area: diff; }
#fCardTopics{ grid-area: topics; }
#fCardPaper{ grid-area: paper; }
#fCardSort{ grid-area: sort; }

/* Topics: 2 columns + scroll so modal doesn't become tall */
#fTopics{
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap:10px 12px;
  max-height: 320px;
  overflow:auto;
  padding-right:6px;
}

/* Difficulty: compact grid */
#fDiffs{
  display:grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap:10px 12px;
}

@media(max-width: 980px){
  .filter-grid{
    grid-template-columns: 1fr;
    grid-template-areas:
      "status"
      "paper"
      "diff"
      "topics"
      "sort";
  }
  #fTopics{
    grid-template-columns: 1fr;
    max-height: 360px;
  }
}

.field{
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:12px;
  background:#fff;
}
.field h4{
  margin:0 0 8px;
  font-size:14px;
  font-weight:900;
}
.checks{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.chk{
  display:inline-flex;
  gap:8px;
  align-items:center;
  border:1px solid #e5e7eb;
  border-radius:999px;
  padding:6px 10px;
  cursor:pointer;
  user-select:none;
  background:#fafafa;
  font-size:13px;
}
.chk input{ transform:scale(1.05); }
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin-top:8px;
}
.input, .select, textarea{
  width:100%;
  padding:10px 10px;
  border:1px solid #d1d5db;
  border-radius:12px;
  font-family:inherit;
  font-size:14px;
  box-sizing:border-box;
}
.select{ max-width: 260px; }
.small{
  font-size:13px;
  color:var(--muted);
  margin-top:6px;
  line-height:1.4;
}

/* Dashboard table */
.stats-grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
  margin-bottom:12px;
}
@media(max-width:860px){
  .stats-grid{ grid-template-columns: 1fr; }
}
.stat-card{
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:12px;
  background:#fff;
}
.stat-card h4{ margin:0 0 8px; font-size:14px; font-weight:900; }
.stat-row{
  display:flex; justify-content:space-between; gap:10px;
  padding:6px 0; border-bottom:1px dashed #e5e7eb;
  font-size:14px;
}
.stat-row:last-child{ border-bottom:none; }
.mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

/* Empty state */
.empty{
  text-align:center;
  padding:30px 12px;
  color:var(--muted);
}

/* Navigator unit styling */
.nav-unit{
  font-size:10px;
  font-weight:600;
  color:#475569;
  background:transparent;
  padding:0;
  border-radius:0;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  opacity:.9;
}
.nav-num{
  font-size:18px;
  font-weight:800;
  color:#111827;
}
.nav-stars{
  font-size:10px;
  font-weight:500;
  color:#f59e0b; /* gold */
  letter-spacing:.2px;
  line-height:1.1;
}

/* Navigator legend + grouping */
.nav-legend{
  margin-top:12px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  padding:10px 12px;
  border:1px solid #e5e7eb;
  background:#ffffff;
  border-radius:12px;
}
.nav-group{
  margin-bottom: 14px;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  background: #fff;
  overflow: hidden;
}
.nav-group-header{
  padding: 10px 12px;
  background: #f8fafc;
  border-bottom: 1px solid #e5e7eb;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.nav-group-title{
  margin:0;
  font-size:14px;
  font-weight:900;
  color:#0b1220;
}
.nav-group-count{
  font-size:12px;
  color:#475569;
  background:#ffffff;
  border:1px solid #e5e7eb;
  padding:4px 8px;
  border-radius:999px;
}
.nav-group-body{ padding: 10px 12px 12px; }

.legend-item{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border:1px solid #e5e7eb;
  background:#fafafa;
  border-radius:999px;
  font-size:13px;
  color:#475569;
  white-space:nowrap;
}
.legend-swatch{
  width:14px;
  height:14px;
  border-radius:6px;
  border:1px solid #cbd5e1;
  background:#fff;
  box-sizing:border-box;
}
.legend-swatch.unseen{ background:#f8fafc; }
.legend-swatch.attempted{ background:#eef2ff; }
.legend-swatch.correct{ background:rgba(34,197,94,.14); border-color:rgba(34,197,94,.35); }
.legend-swatch.incorrect{ background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.35); }
.legend-swatch.flagged{
  background:#fff;
  border-color:rgba(251,191,36,.95);
  box-shadow: inset 0 0 0 2px rgba(251,191,36,.85);
}

/* Auto media styling (works anywhere: prompt/options/solution) */
.qa-figure{
  margin: 12px 0;
  border: 1px solid rgba(148,163,184,.45);
  border-radius: 14px;
  overflow: hidden;
  background: rgba(255,255,255,.04);
}
.qa-img{
  width: 100%;
  height: auto;
  display: block;
  object-fit: contain;
}
.qa-cap{
  padding: 8px 10px;
  font-size: 12px;
  opacity: .8;
  border-top: 1px solid rgba(148,163,184,.25);
}
.zoomable{ cursor: zoom-in; }

/* IMPORTANT: navGrid is now a wrapper (NOT the tile grid) */
#navGrid{ display:block !important; }
#navGrid.nav-grid{
  display:block !important;
  grid-template-columns:none !important;
}
</style>

<style>
  html, body {
    overflow-x: hidden !important;
  }

  body {
    padding-bottom: 78px;
  }

  .question-media img,
  .qa-img,
  img {
    max-width: 100%;
    height: auto;
  }

  button,
  .btn,
  .option,
  .nav-btn,
  input,
  label {
    pointer-events: auto !important;
  }

  .qbody {
    font-size: 19px;
    line-height: 1.65;
  }

  .option.selected {
    border-color: #0074c1;
    background: #eef6ff;
  }

  .option.locked {
    cursor: default;
  }

  .option-label {
    font-weight: 900;
    min-width: 28px;
  }

  .ts-error {
    border: 1px solid rgba(239,68,68,.35);
    background: rgba(239,68,68,.08);
    color: #991b1b;
    padding: 12px 14px;
    border-radius: 12px;
    margin: 14px 0;
    font-size: 16px;
  }
</style>
</head>

<body>
  <div class="header">
    <div class="header-left">
      <div>
        <div class="brand">AMC 8 Question Bank</div>
        <div class="subbrand">Thriving Scholars</div>
      </div>
    </div>

    <div class="header-right">
      <span class="pill"><strong id="filterCount">0</strong> showing</span>
      <span class="pill">Q <strong id="qNum">0</strong> / <strong id="qTotal">0</strong></span>
      <span id="saveIndicator" class="save-indicator">Saved ✓</span>
      <button class="btn outline" id="filtersBtn" type="button">Filters</button>
      <button class="btn light" id="navBtnTop" type="button">Navigator</button>
    </div>
  </div>

  <main class="container">
    <div id="errorBox"></div>

    <div class="topbar">
      <div class="chips">
        <span class="chip"><span class="dot"></span><span id="activeExamChip">AMC 8</span></span>
        <span class="chip"><span class="dot"></span><span id="activeFilterChip">All questions</span></span>
      </div>
    </div>

    <section class="qcard">
      <div class="qhead">
        <h2 class="qtitle"><span class="calc"></span><span id="questionTitle">Question</span></h2>
        <div class="qmeta">
          <span class="meta-pill" id="paperMeta">AMC 8</span>
          <span class="meta-pill" id="topicMeta">Topic</span>
          <span class="meta-pill" id="difficultyMeta">Difficulty</span>
          <span class="meta-pill" id="statusMeta">Unattempted</span>
        </div>
      </div>

      <div class="qbody" id="promptBox">Loading...</div>
      <div id="mediaBox"></div>
      <div class="options" id="optionsBox"></div>

      <div class="hint-box" id="hintBox"></div>

      <div class="feedback" id="feedbackBox" style="display:none;"></div>

      <div class="solution" id="solutionBox">
        <h4>Solution</h4>
        <div id="solutionInner"></div>
      </div>
    </section>
  </main>

  <div class="footer">
    <div class="footer-inner">
      <div class="footer-left">
        <a class="btn menu" href="/dashboard" style="text-decoration:none;">← AMC Workspace</a>
      </div>
      <div class="footer-right">
        <button type="button" id="prevBtn">← Previous</button>
        <button type="button" id="nextBtn">Next →</button>
        <button type="button" id="checkBtn">Check</button>
        <button type="button" id="hintBtn">Show Hint</button>
        <button type="button" class="light" id="navBtnBottom">Navigator</button>
      </div>
    </div>
  </div>

  <!-- Navigator -->
  <div class="overlay" id="navOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3>Navigator</h3>
        <button class="modal-close" type="button" id="closeNavBtn">Close</button>
      </div>
      <div class="modal-body">
        <div class="nav-toolbar">
          <div class="small"><strong id="navTotal">0</strong> questions in this view</div>
        </div>
        <div id="navGrid" class="nav-grid"></div>

        <div class="nav-legend">
          <span class="legend-item"><span class="legend-swatch unseen"></span>Unseen</span>
          <span class="legend-item"><span class="legend-swatch attempted"></span>Attempted</span>
          <span class="legend-item"><span class="legend-swatch correct"></span>Correct</span>
          <span class="legend-item"><span class="legend-swatch incorrect"></span>Incorrect</span>
          <span class="legend-item"><span class="legend-swatch flagged"></span>Flagged</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="overlay" id="filtersOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3>Filters</h3>
        <button class="modal-close" type="button" id="closeFiltersBtn">Close</button>
      </div>

      <div class="modal-body">
        <div class="filter-grid">
          <div class="field" id="fCardStatus">
            <h4>Status</h4>
            <select class="select" id="statusFilter">
              <option value="all">All</option>
              <option value="unattempted">Unattempted</option>
              <option value="attempted">Attempted</option>
              <option value="correct">Correct</option>
              <option value="incorrect">Incorrect</option>
              <option value="flagged">Flagged</option>
            </select>
          </div>

          <div class="field" id="fCardDifficulty">
            <h4>Difficulty</h4>
            <div class="checks" id="difficultyChecks"></div>
          </div>

          <div class="field" id="fCardTopics">
            <h4>Topics</h4>
            <div class="checks" id="topicChecks"></div>
          </div>

          <div class="field" id="fCardSort">
            <h4>Sort</h4>
            <select class="select" id="sortFilter">
              <option value="order">Original order</option>
              <option value="topic">Topic</option>
              <option value="difficulty">Difficulty</option>
            </select>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="modal-close" type="button" id="clearFiltersBtn">Clear Filters</button>
        <button class="btn" type="button" id="applyFiltersBtn">Apply</button>
      </div>
    </div>
  </div>

<script>
(function(){
  const EXAM = "AMC 8";
  const STORAGE_KEY = "ts_amc_qb_state__" + EXAM.replace(/\s+/g, "_").toLowerCase();

  let allSummaries = [];
  let visibleSummaries = [];
  let currentIndex = 0;
  let currentQuestion = null;
  let selected = "";
  let checked = false;

  let state = loadState();

  function $(id){ return document.getElementById(id); }

  function loadState(){
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}") || {};
    } catch(e) {
      return {};
    }
  }

  function saveState(){
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      const s = $("saveIndicator");
      if (s) {
        s.style.display = "inline-flex";
        clearTimeout(window.__saveT);
        window.__saveT = setTimeout(() => s.style.display = "none", 850);
      }
    } catch(e) {}
  }

  function escapeHtml(s){
    return String(s || "").replace(/[&<>"']/g, function(c){
      return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" })[c];
    });
  }

  function showError(msg){
    $("errorBox").innerHTML = msg ? `<div class="ts-error">${escapeHtml(msg)}</div>` : "";
  }

  function typeset(node){
    setTimeout(function(){
      try {
        if (window.MathJax && window.MathJax.typesetPromise) {
          window.MathJax.typesetPromise(node ? [node] : undefined);
        }
      } catch(e) {}
    }, 50);
  }

  async function api(url, opts){
    const res = await fetch(url, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.ok === false) {
      throw new Error(data.error || "Request failed");
    }
    return data;
  }

  function qState(qid){
    if (!state[qid]) state[qid] = {};
    return state[qid];
  }

  function statusFor(qid){
    const a = state[qid] || {};
    if (a.checked && a.isCorrect) return "Correct";
    if (a.checked && !a.isCorrect) return "Incorrect";
    if (a.selected) return "Attempted";
    return "Unattempted";
  }

  function assetUrl(a){
    if (!a) return "";
    if (typeof a === "string") return a;
    return a.url || a.src || a.href || "";
  }

  function renderAssets(q){
    const arr = [];
    if (Array.isArray(q.page_assets)) arr.push(...q.page_assets);
    if (Array.isArray(q.question_assets)) arr.push(...q.question_assets);

    $("mediaBox").innerHTML = arr.map(function(a){
      const url = assetUrl(a);
      const cap = typeof a === "object" ? (a.caption || a.label || "") : "";
      if (!url) return "";
      return `<div class="question-media"><figure class="qa-figure"><img class="qa-img" src="${escapeHtml(url)}" alt="${escapeHtml(cap || "Question image")}">${cap ? `<figcaption class="qa-cap">${escapeHtml(cap)}</figcaption>` : ""}</figure></div>`;
    }).join("");
  }

  function optionAssets(opt){
    const arr = Array.isArray(opt.assets) ? opt.assets : [];
    return arr.map(function(a){
      const url = assetUrl(a);
      if (!url) return "";
      return `<div class="question-media"><img class="qa-img" src="${escapeHtml(url)}" alt="Option image"></div>`;
    }).join("");
  }

  function renderOptions(q){
    const a = qState(q.qid);
    selected = a.selected || "";
    checked = !!a.checked;

    $("optionsBox").innerHTML = (q.options || []).map(function(opt){
      const label = String(opt.label || "").trim();
      let cls = "option";
      if (label === selected) cls += " selected";
      if (checked && label === q.answer) cls += " correct";
      if (checked && label === selected && label !== q.answer) cls += " wrong";
      if (checked) cls += " locked";

      return `
        <label class="${cls}" data-label="${escapeHtml(label)}">
          <div class="option-row">
            <input type="radio" name="answer" ${label === selected ? "checked" : ""} ${checked ? "disabled" : ""}>
            <span class="option-label">${escapeHtml(label)}</span>
            <span class="option-html">${opt.html || ""}${optionAssets(opt)}</span>
          </div>
        </label>
      `;
    }).join("");

    document.querySelectorAll(".option").forEach(function(el){
      el.addEventListener("click", function(){
        if (!currentQuestion || checked) return;
        selected = el.getAttribute("data-label") || "";
        const a = qState(currentQuestion.qid);
        a.selected = selected;
        saveState();
        renderOptions(currentQuestion);
      });
    });

    typeset($("optionsBox"));
  }

  function sortVisible(list){
    const sort = state.__sort || "order";
    const copy = list.slice();

    function topicNum(t){
      const m = String(t || "").match(/^(\d+)/);
      return m ? Number(m[1]) : 9999;
    }

    if (sort === "topic") {
      copy.sort((a,b) => {
        const n = topicNum(a.topic) - topicNum(b.topic);
        if (n) return n;
        const t = String(a.topic || "").localeCompare(String(b.topic || ""), undefined, { numeric:true, sensitivity:"base" });
        if (t) return t;
        return Number(a.display_order || 0) - Number(b.display_order || 0);
      });
    } else if (sort === "difficulty") {
      copy.sort((a,b) => {
        const d = Number(a.difficulty || 0) - Number(b.difficulty || 0);
        if (d) return d;
        return Number(a.display_order || 0) - Number(b.display_order || 0);
      });
    } else {
      copy.sort((a,b) => Number(a.display_order || 0) - Number(b.display_order || 0));
    }

    return copy;
  }

  function applyFilters(){
    const status = state.__status || "all";
    const diffs = state.__diffs || [];
    const topics = state.__topics || [];

    visibleSummaries = allSummaries.filter(function(q){
      const a = state[q.qid] || {};
      const st = statusFor(q.qid).toLowerCase();

      if (status !== "all") {
        if (status === "flagged") {
          if (!a.flagged) return false;
        } else if (st !== status) {
          return false;
        }
      }

      if (diffs.length && !diffs.includes(String(q.difficulty))) return false;
      if (topics.length && !topics.includes(String(q.topic))) return false;

      return true;
    });

    visibleSummaries = sortVisible(visibleSummaries);

    $("filterCount").textContent = visibleSummaries.length;
    $("qTotal").textContent = visibleSummaries.length;
    $("navTotal").textContent = visibleSummaries.length;
    $("activeFilterChip").textContent = visibleSummaries.length + " of " + allSummaries.length + " questions";

    if (currentIndex >= visibleSummaries.length) currentIndex = 0;
  }

  async function loadList(){
    showError("");
    $("promptBox").innerHTML = "Loading questions...";

    const data = await api(`/api/amc/qb/list?paper=${encodeURIComponent(EXAM)}`);
    allSummaries = data.questions || data.items || [];

    buildFilters();
    applyFilters();

    if (!visibleSummaries.length) {
      $("promptBox").innerHTML = "No questions found for " + EXAM + ".";
      return;
    }

    currentIndex = 0;
    await loadQuestion();
  }

  async function loadQuestion(){
    if (!visibleSummaries.length) return;

    showError("");
    currentQuestion = null;
    selected = "";
    checked = false;

    $("hintBox").style.display = "none";
    $("hintBox").innerHTML = "";
    $("feedbackBox").style.display = "none";
    $("feedbackBox").innerHTML = "";
    $("solutionBox").style.display = "none";
    $("solutionInner").innerHTML = "";
    $("mediaBox").innerHTML = "";
    $("optionsBox").innerHTML = "";
    $("promptBox").innerHTML = "Loading question...";

    const summary = visibleSummaries[currentIndex];
    const data = await api(`/api/amc/qb/question?qid=${encodeURIComponent(summary.qid)}&paper=${encodeURIComponent(EXAM)}`);
    currentQuestion = data.question;

    $("questionTitle").innerHTML = "Question " + (currentIndex + 1);
    $("qNum").textContent = currentIndex + 1;
    $("paperMeta").textContent = EXAM;
    $("topicMeta").textContent = currentQuestion.topic || "Topic";
    $("difficultyMeta").textContent = currentQuestion.difficulty ? "Difficulty " + currentQuestion.difficulty + " / 5" : "Difficulty";
    $("statusMeta").textContent = statusFor(currentQuestion.qid);

    $("promptBox").innerHTML = currentQuestion.prompt_html || "";
    renderAssets(currentQuestion);
    renderOptions(currentQuestion);
    updateButtons();
    renderNavigator();

    typeset();
  }

  async function checkAnswer(){
    if (!currentQuestion) return;

    const a = qState(currentQuestion.qid);
    if (!a.selected) {
      alert("Please select an option first.");
      return;
    }

    const data = await api("/api/amc/qb/check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        qid: currentQuestion.qid,
        selected: a.selected,
        paper: EXAM
      })
    });

    a.checked = true;
    a.isCorrect = !!(data.correct || data.isCorrect);
    currentQuestion.answer = data.answer;
    saveState();

    $("statusMeta").textContent = a.isCorrect ? "Correct" : "Incorrect";

    $("feedbackBox").style.display = "block";
    $("feedbackBox").className = "feedback " + (a.isCorrect ? "good" : "bad");
    $("feedbackBox").innerHTML = a.isCorrect ? "Correct." : "Incorrect. Correct answer: <strong>" + escapeHtml(data.answer) + "</strong>.";

    $("solutionBox").style.display = "block";
    $("solutionInner").innerHTML = data.solution_html || "";

    renderOptions(currentQuestion);
    renderNavigator();
    typeset();
  }

  function showHint(){
    if (!currentQuestion) return;
    $("hintBox").style.display = "block";
    $("hintBox").innerHTML = currentQuestion.nice_tip_html || "<h4>Hint</h4><p>No quick hint is available for this question.</p>";
    typeset($("hintBox"));
  }

  function updateButtons(){
    $("prevBtn").disabled = currentIndex <= 0;
    $("nextBtn").disabled = currentIndex >= visibleSummaries.length - 1;
  }

  function renderNavigator(){
    $("navGrid").innerHTML = visibleSummaries.map(function(q, i){
      const a = state[q.qid] || {};
      let cls = "nav-btn";
      if (i === currentIndex) cls += " current";
      if (a.checked && a.isCorrect) cls += " correct";
      else if (a.checked && !a.isCorrect) cls += " incorrect";
      else if (a.selected) cls += " attempted";
      else cls += " unseen";
      if (a.flagged) cls += " flagged";

      return `<button type="button" class="${cls}" data-i="${i}">
        <span class="nav-num">${i + 1}</span>
        <span class="nav-unit">${escapeHtml(q.topic || "")}</span>
      </button>`;
    }).join("");

    document.querySelectorAll(".nav-btn").forEach(function(btn){
      btn.addEventListener("click", async function(){
        currentIndex = Number(btn.getAttribute("data-i") || 0);
        closeOverlay("navOverlay");
        await loadQuestion();
      });
    });
  }

  function unique(arr){
    return Array.from(new Set(arr.filter(Boolean)));
  }

  function buildFilters(){
    const diffs = unique(allSummaries.map(q => String(q.difficulty || ""))).sort((a,b) => Number(a)-Number(b));
    const topics = unique(allSummaries.map(q => String(q.topic || ""))).sort((a,b) => {
      const na = Number((a.match(/^(\d+)/)||[])[1] || 9999);
      const nb = Number((b.match(/^(\d+)/)||[])[1] || 9999);
      if (na !== nb) return na - nb;
      return a.localeCompare(b, undefined, { numeric:true, sensitivity:"base" });
    });

    $("difficultyChecks").innerHTML = diffs.map(d => `
      <label class="chk"><input type="checkbox" value="${escapeHtml(d)}"> Difficulty ${escapeHtml(d)}</label>
    `).join("");

    $("topicChecks").innerHTML = topics.map(t => `
      <label class="chk"><input type="checkbox" value="${escapeHtml(t)}"> ${escapeHtml(t)}</label>
    `).join("");
  }

  function syncFilterUI(){
    $("statusFilter").value = state.__status || "all";
    $("sortFilter").value = state.__sort || "order";

    document.querySelectorAll("#difficultyChecks input").forEach(function(cb){
      cb.checked = (state.__diffs || []).includes(cb.value);
    });

    document.querySelectorAll("#topicChecks input").forEach(function(cb){
      cb.checked = (state.__topics || []).includes(cb.value);
    });
  }

  function readFilterUI(){
    state.__status = $("statusFilter").value || "all";
    state.__sort = $("sortFilter").value || "order";
    state.__diffs = Array.from(document.querySelectorAll("#difficultyChecks input:checked")).map(x => x.value);
    state.__topics = Array.from(document.querySelectorAll("#topicChecks input:checked")).map(x => x.value);
    saveState();
    applyFilters();
  }

  function openOverlay(id){
    if (id === "filtersOverlay") syncFilterUI();
    if (id === "navOverlay") renderNavigator();
    $(id).style.display = "block";
  }

  function closeOverlay(id){
    $(id).style.display = "none";
  }

  $("prevBtn").addEventListener("click", async function(){
    if (currentIndex > 0) {
      currentIndex--;
      await loadQuestion();
    }
  });

  $("nextBtn").addEventListener("click", async function(){
    if (currentIndex < visibleSummaries.length - 1) {
      currentIndex++;
      await loadQuestion();
    }
  });

  $("checkBtn").addEventListener("click", function(){
    checkAnswer().catch(err => showError(err.message || String(err)));
  });

  $("hintBtn").addEventListener("click", showHint);

  $("navBtnTop").addEventListener("click", () => openOverlay("navOverlay"));
  $("navBtnBottom").addEventListener("click", () => openOverlay("navOverlay"));
  $("closeNavBtn").addEventListener("click", () => closeOverlay("navOverlay"));

  $("filtersBtn").addEventListener("click", () => openOverlay("filtersOverlay"));
  $("closeFiltersBtn").addEventListener("click", () => closeOverlay("filtersOverlay"));

  $("applyFiltersBtn").addEventListener("click", async function(){
    readFilterUI();
    closeOverlay("filtersOverlay");
    currentIndex = 0;
    if (visibleSummaries.length) await loadQuestion();
    else $("promptBox").innerHTML = "No questions match these filters.";
  });

  $("clearFiltersBtn").addEventListener("click", async function(){
    state.__status = "all";
    state.__sort = "order";
    state.__diffs = [];
    state.__topics = [];
    saveState();
    applyFilters();
    syncFilterUI();
    currentIndex = 0;
    if (visibleSummaries.length) await loadQuestion();
  });

  document.querySelectorAll(".overlay").forEach(function(ov){
    ov.addEventListener("click", function(e){
      if (e.target === ov) ov.style.display = "none";
    });
  });

  window.addEventListener("keydown", async function(e){
    if (e.altKey && e.key.toLowerCase() === "n") {
      e.preventDefault();
      if (currentIndex < visibleSummaries.length - 1) {
        currentIndex++;
        await loadQuestion();
      }
    }

    if (e.altKey && e.key.toLowerCase() === "p") {
      e.preventDefault();
      if (currentIndex > 0) {
        currentIndex--;
        await loadQuestion();
      }
    }
  });

  loadList().catch(function(err){
    showError(err.message || String(err));
    $("promptBox").innerHTML = "Could not load the question bank.";
  });
})();
</script>
</body>
</html>

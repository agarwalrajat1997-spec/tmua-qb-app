<head>
  <meta charset="UTF-8" />
  <title>ESAT Mock Test 3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin:0;
      min-height:100vh;
      background:#FFFDF7;
      color:#141414;
      font-family:Arial, Helvetica, sans-serif;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card {
      max-width:760px;
      width:100%;
      background:#fff;
      border:2px solid #E7E7E7;
      border-radius:18px;
      padding:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.06);
    }
    .kicker {
      font-size:12px;
      font-weight:900;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#7A1F24;
      margin-bottom:10px;
    }
    h1 {
      margin:0 0 10px;
      font-size:38px;
      line-height:1.08;
      letter-spacing:-.03em;
    }
    .meta {
      display:inline-flex;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.12);
      background:#FFF3D1;
      font-size:13px;
      font-weight:900;
      margin:6px 8px 6px 0;
    }
    .sections {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
      gap:12px;
      margin-top:22px;
    }
    .section {
      border:1px solid #E7E7E7;
      border-radius:14px;
      padding:16px;
      background:#fff;
      font-weight:900;
    }
    .small {
      color:#5E5E5E;
      font-size:14px;
      line-height:1.6;
      margin-top:18px;
    }
    .btn {
      display:inline-flex;
      margin-top:20px;
      background:#7A1F24;
      color:#fff;
      text-decoration:none;
      padding:12px 16px;
      border-radius:12px;
      font-weight:900;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker">Thriving Scholars Â· ESAT</div>
    <h1>ESAT Mock Test 3</h1>

    <div>
      <span class="meta">Engineering</span>
      <span class="meta">2 hours total</span>
      <span class="meta">3 timed sections</span>
    </div>

    <div class="sections">
      <div class="section">Math<br><span class="small">40 minutes</span></div>
      <div class="section">1<br><span class="small">40 minutes</span></div>

  </main>
<script id="ts-hotkeys-v1">
(function () {
  if (window.__TS_HOTKEYS_V1__) return;
  window.__TS_HOTKEYS_V1__ = true;

  function isTyping() {
    var el = document.activeElement;
    if (!el) return false;
    var tag = (el.tagName || "").toLowerCase();
    return tag === "input" || tag === "textarea" || tag === "select" || el.isContentEditable;
  }

  document.addEventListener("keydown", function (event) {
    if (!event.altKey || event.ctrlKey || event.metaKey || event.shiftKey) return;
    if (isTyping()) return;

    var key = String(event.key || "").toLowerCase();
    var action = null;

    if (key === "n" && typeof window.nextQuestion === "function") action = window.nextQuestion;
    if (key === "p" && typeof window.prevQuestion === "function") action = window.prevQuestion;
    if (key === "f" && typeof window.toggleFlag === "function") action = window.toggleFlag;
    if (key === "v" && typeof window.openNavigator === "function") action = window.openNavigator;

    if (!action) return;
    event.preventDefault();
    action();
  });
})();
</script>
</body>
</html>
